name: Docker Image CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "master"

env:
  REGISTRY: docker.io
  API_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/content-aggregator-api
  WORKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/content-aggregator-worker
  API_CONTAINER_NAME: content-aggregator-api
  WORKER_CONTAINER_NAME: content-aggregator-worker
  NETWORK_NAME: contentaggregator-network

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Stop and Remove Old Container
        run: |
          docker stop ${{ env.API_CONTAINER_NAME }} || true
          docker rm ${{ env.API_CONTAINER_NAME }} || true
          docker stop ${{ env.WORKER_CONTAINER_NAME }} || true
          docker rm ${{ env.WORKER_CONTAINER_NAME }} || true

      - name: Remove Old Docker Images
        run: |
          docker rmi ${{ env.API_IMAGE_NAME }}:latest || true
          docker rmi ${{ env.WORKER_IMAGE_NAME }}:latest || true

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PROJECT_PATH=ContentAggregator.API/ContentAggregator.API.csproj
            APP_DLL=ContentAggregator.API.dll
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.run_number }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PROJECT_PATH=ContentAggregator.Worker/ContentAggregator.Worker.csproj
            APP_DLL=ContentAggregator.Worker.dll
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.run_number }}

      - name: Create Docker Network
        run: docker network create ${{ env.NETWORK_NAME }} || true

      - name: Clean up previous dev-cert
        run: |
          rm -f dev-cert.pfx

      - name: Decode and Save dev-cert
        run: |
          echo "${{ secrets.DEV_CERT }}" | base64 --decode > dev-cert.pfx

      - name: Apply database migrations
        run: |
          docker run --rm \
            --network ${{ env.NETWORK_NAME }} \
            -e CONNECTIONSTRINGS__POSTGRESQLCONNECTION="${{ secrets.CONNECTIONSTRINGS__POSTGRESQLCONNECTION }}" \
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest \
            bootstrap

      - name: Deploy API container
        run: |
          docker run -d \
            --name ${{ env.API_CONTAINER_NAME }} \
            --network ${{ env.NETWORK_NAME }} \
            -v "$(pwd)/dev-cert.pfx:/etc/ssl/certs/dev-cert.pfx" \
            -p 80:80 \
            -p 443:443 \
            -e CONNECTIONSTRINGS__POSTGRESQLCONNECTION="${{ secrets.CONNECTIONSTRINGS__POSTGRESQLCONNECTION }}" \
            -e FACEBOOK__ACCESSTOKEN="${{ secrets.FACEBOOKACCESSTOKEN }}" \
            -e FACEBOOK__PAGEID="${{ secrets.FBPAGEID }}" \
            -e HTTPSCERTIFICATE__PASSWORD="${{ secrets.CERT_PASSWORD }}" \
            -e LMSTUDIO__BASEURL="${{ secrets.LMSTUDIOAPIURL }}" \
            -e YOUTUBEAPI__APIKEY="${{ secrets.YOUTUBEACCESSTOKEN }}" \
            -e YOUTUBECOMMENT__OAUTHACCESSTOKEN="${{ secrets.YOUTUBEOAUTHACCESSTOKEN }}" \
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest

      - name: Deploy Worker container
        run: |
          docker run -d \
            --name ${{ env.WORKER_CONTAINER_NAME }} \
            --network ${{ env.NETWORK_NAME }} \
            -e CONNECTIONSTRINGS__POSTGRESQLCONNECTION="${{ secrets.CONNECTIONSTRINGS__POSTGRESQLCONNECTION }}" \
            -e FACEBOOK__ACCESSTOKEN="${{ secrets.FACEBOOKACCESSTOKEN }}" \
            -e FACEBOOK__PAGEID="${{ secrets.FBPAGEID }}" \
            -e LMSTUDIO__BASEURL="${{ secrets.LMSTUDIOAPIURL }}" \
            -e YOUTUBEAPI__APIKEY="${{ secrets.YOUTUBEACCESSTOKEN }}" \
            -e YOUTUBECOMMENT__OAUTHACCESSTOKEN="${{ secrets.YOUTUBEOAUTHACCESSTOKEN }}" \
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest
